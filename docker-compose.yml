version: "3.9"

services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: guitar_tutor
      POSTGRES_USER: guitar
      POSTGRES_PASSWORD: guitar
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guitar -d guitar_tutor"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .           # project root — so COPY backend/ and COPY data/ both work
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+asyncpg://guitar:guitar@db:5432/guitar_tutor
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-change-in-production-use-64-chars}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
